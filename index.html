<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Music</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo"><h1>Grok Music</h1></div>
            <nav>
                <ul>
                    <li onclick="navigateTo('home')">🏠 Home</li>
                    <li onclick="navigateTo('search')">🔍 Buscar</li>
                    <li onclick="navigateTo('library')">📚 Biblioteca</li>
                </ul>
            </nav>
            <div class="playlists">
                <h3>Playlists</h3>
                <ul id="playlist-list"></ul>
            </div>
        </aside>

        <!-- Main -->
        <main class="main-content">
            <header class="top-nav">
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Buscar músicas..." onkeyup="if(event.key==='Enter') searchMusic()">
                    <button onclick="searchMusic()">🔍</button>
                </div>
                <span>Bem-vindo!</span>
            </header>

            <section id="home-section" class="section active">
                <div class="hero">
                    <h2>Descubra Novas Músicas</h2>
                    <p>10 faixas royalty-free</p>
                    <button onclick="playFeatured()">▶ Reproduzir Agora</button>
                </div>
                <h2>Músicas Populares</h2>
                <div class="songs-grid" id="popular-songs"></div>
            </section>

            <section id="search-section" class="section">
                <h2>Resultados</h2>
                <div class="songs-grid" id="search-results"></div>
            </section>
        </main>
    </div>

    <!-- Player -->
    <footer class="player">
        <div class="now-playing">
            <img id="player-cover" src="https://picsum.photos/id/1015/60/60" alt="">
            <div>
                <p id="player-title">Selecione uma música</p>
                <p id="player-artist">Artista</p>
            </div>
        </div>
        <div class="player-controls">
            <button onclick="prevTrack()">⏮️</button>
            <button id="play-pause-btn" onclick="togglePlay()">▶️</button>
            <button onclick="nextTrack()">⏭️</button>
        </div>
    </footer>

    <audio id="audio-player"></audio>
    <script src="script.js"></script>
</body>
</html>
